name: Update Dynamic README Content

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate dynamic assets and update README
        run: python .github/scripts/update_dynamic_content.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md assets/generated/*.svg
          git diff --staged --quiet || git commit -m "chore(profile): refresh dynamic content assets"
          git pull --rebase
          git push
