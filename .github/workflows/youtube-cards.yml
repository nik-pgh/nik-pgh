name: Update README Cards
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # --- Blog Post Cards ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch blog posts and generate cards
        run: python .github/scripts/update_blog_cards.py

      - name: Commit blog post cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update blog post cards"

      # --- YouTube Cards ---
      - uses: DenverCoder1/github-readme-youtube-cards@main
        with:
          channel_id: UCXkXJZVNrzh4o8UatfVKb9g
          lang: en
          comment_tag_name: YOUTUBE-CARDS
          max_videos: 6
          card_width: 250
          background_color: "#0d1117"
          title_color: "#ffffff"
          stats_color: "#dedede"
          border_radius: 5
          output_type: markdown

      - name: Commit YouTube cards
        run: |
          git add README.md
          git diff --staged --quiet || git commit -m "Update YouTube cards"

      - name: Push changes
        run: git push
